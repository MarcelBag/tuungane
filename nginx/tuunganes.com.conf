# Production Nginx vhost for tuunganes.com.
# Merge these redirect locations into the active VPS vhost, then run:
#   sudo nginx -t && sudo systemctl reload nginx

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name www.tuunganes.com;

  ssl_certificate /etc/letsencrypt/live/tuunganes.com/cert.pem;
  ssl_certificate_key /etc/letsencrypt/live/tuunganes.com/privkey.pem;

  return 301 https://tuunganes.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name tuunganes.com;

  ssl_certificate /etc/letsencrypt/live/tuunganes.com/cert.pem;
  ssl_certificate_key /etc/letsencrypt/live/tuunganes.com/privkey.pem;

  root /home/tuungane/htdocs/tuunganes.com;
  index index.html;

  access_log /home/tuungane/logs/nginx/access.log main;
  error_log /home/tuungane/logs/nginx/error.log;

  location ~ /.well-known {
    auth_basic off;
    allow all;
  }

  # Canonical SEO redirects reported in Google Search Console.
  location = /index.html {
    return 301 https://tuunganes.com/;
  }

  location = /home {
    return 301 https://tuunganes.com/;
  }

  location = /home/ {
    return 301 https://tuunganes.com/;
  }

  location ~ ^/(en|fr|de)/home/?$ {
    return 301 https://tuunganes.com/;
  }

  location = /services/agtech.html {
    return 301 https://tuunganes.com/services/AgTech.html;
  }

  location /uwsgi {
    include uwsgi_params;
    uwsgi_read_timeout 3600;
    uwsgi_pass 127.0.0.1:8090;
  }

  location ~* \.(css|js|jpg|jpeg|gif|png|ico|gz|svg|svgz|ttf|otf|woff|woff2|eot|mp4|ogg|ogv|webm|webp|zip|swf)$ {
    add_header Access-Control-Allow-Origin "*";
    expires max;
    access_log on;
    try_files $uri @app;
  }

  location / {
    try_files $uri $uri/ @app;
  }

  location @app {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass_request_headers on;
    proxy_max_temp_file_size 0;
    proxy_connect_timeout 900;
    proxy_send_timeout 900;
    proxy_read_timeout 900;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;
  }
}

server {
  listen 80;
  listen [::]:80;

  server_name tuunganes.com www.tuunganes.com;

  return 301 https://tuunganes.com$request_uri;
}
