# Production Nginx vhost for the static Tuunganes HTML site.
# Active document root on the VPS:
#   /home/tuungane/htdocs/tuunganes.com/tuungane

server {
  listen 80;
  listen [::]:80;

  server_name tuunganes.com www.tuunganes.com;

  return 301 https://tuunganes.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name www.tuunganes.com;

  ssl_certificate /etc/letsencrypt/live/tuunganes.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tuunganes.com/privkey.pem;
  ssl_stapling on;
  ssl_stapling_verify on;
  ssl_trusted_certificate /etc/letsencrypt/live/tuunganes.com/chain.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers on;

  return 301 https://tuunganes.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name tuunganes.com;

  ssl_certificate /etc/letsencrypt/live/tuunganes.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tuunganes.com/privkey.pem;
  ssl_stapling on;
  ssl_stapling_verify on;
  ssl_trusted_certificate /etc/letsencrypt/live/tuunganes.com/chain.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers on;

  root /home/tuungane/htdocs/tuunganes.com/tuungane;
  index index.html;

  access_log /home/tuungane/logs/nginx/access.log main;
  error_log /home/tuungane/logs/nginx/error.log;

  location ~ /.well-known {
    auth_basic off;
    allow all;
  }

  location = /index.html {
    return 301 https://tuunganes.com/;
  }

  location = /home {
    return 301 https://tuunganes.com/;
  }

  location = /home/ {
    return 301 https://tuunganes.com/;
  }

  location ~ ^/(en|fr|de)/home/?$ {
    return 301 https://tuunganes.com/;
  }

  location = /services/agtech.html {
    return 301 https://tuunganes.com/services/AgTech.html;
  }

  location ~* \.(css|js|jpg|jpeg|gif|png|ico|gz|svg|svgz|ttf|otf|woff|woff2|eot|mp4|ogg|ogv|webm|webp|zip|swf)$ {
    add_header Access-Control-Allow-Origin "*";
    expires max;
    access_log on;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  add_header X-Frame-Options "";
}
